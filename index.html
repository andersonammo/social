<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammo Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231d4ed8'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-style='italic' font-size='70' fill='white'>A</text></svg>">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .aside-scroll::-webkit-scrollbar { width: 4px; }
        .aside-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media (min-width: 1024px) { .aside-fixed { height: calc(100vh - 100px); overflow-y: auto; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    
    <audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <div id="story-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex-col justify-center items-center backdrop-blur-sm">
        <div class="absolute top-0 left-0 w-full h-1 bg-gray-700 z-[70]"><div id="story-progress-bar" class="h-full bg-white w-0"></div></div>
        <div class="absolute top-0 w-full p-4 mt-1 flex justify-between items-center z-50 text-white">
            <div class="flex items-center gap-3"><img id="modal-story-avatar" src="" class="w-10 h-10 rounded-full border-2 border-white object-cover"><p id="modal-story-autor" class="font-bold text-sm"></p></div>
            <button onclick="fecharStory()" class="text-3xl">&times;</button>
        </div>
        <img id="modal-story-img" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg relative z-40">
    </div>

    <nav class="bg-blue-700 text-white p-3 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold italic tracking-tighter">Ammo Connect</h1>
        <div class="flex items-center gap-3">
            <img id="foto-usuario-nav" class="w-8 h-8 rounded-full border border-white object-cover bg-white" src="">
            <button onclick="sair()" class="text-xs bg-blue-800 hover:bg-red-500 px-4 py-1.5 rounded-full transition-all">Sair</button>
        </div>
    </nav>

    <input type="file" id="input-upload-perfil" accept="image/*" class="hidden">
    <input type="file" id="input-upload-capa" accept="image/*" class="hidden">
    <input type="file" id="input-upload-destaque" accept="image/*" class="hidden">

    <div class="container mx-auto mt-6 flex flex-col lg:flex-row justify-center items-start gap-6 px-4 pb-10">
        
        <aside class="w-full lg:w-1/4 space-y-4 lg:sticky lg:top-20 z-30 aside-fixed aside-scroll scrollbar-hide">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div id="perfil-capa" class="h-28 bg-blue-500 bg-cover bg-center cursor-pointer" onclick="mudarCapa()"></div>
                <div class="px-4 pb-4 text-center">
                    <img id="foto-usuario-card" class="w-28 h-28 rounded-full border-4 border-white object-cover mx-auto -mt-14 bg-white shadow-lg cursor-pointer" onclick="mudarFotoPerfil()">
                    <h2 id="nome-card" class="text-lg font-bold mt-2 text-gray-800 uppercase tracking-tight"></h2>
                    <p id="cargo-card" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest"></p>
                    <p id="bio-card" class="text-sm italic text-gray-600 mt-3 pt-3 border-t cursor-pointer hover:text-blue-500" onclick="mudarBio()"></p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl border space-y-4 shadow-sm">
                <div><h3 class="text-[10px] font-black text-blue-600 uppercase mb-1">📅 Reuniões</h3><div id="info-reunioes" class="text-xs text-gray-700 font-medium"></div></div>
                <div><h3 class="text-[10px] font-black text-green-600 uppercase mb-1">👓 Setor Ótico</h3><div id="info-setor" class="text-xs"></div></div>
                <div><h3 class="text-[10px] font-black text-red-600 uppercase mb-1">🗓️ Agenda</h3><div id="info-agenda" class="text-xs text-gray-700"></div></div>
                <a id="link-treinamento" href="#" target="_blank" class="block bg-blue-600 text-white p-2.5 rounded-lg text-center text-[10px] font-black uppercase tracking-widest hover:bg-blue-700">Escola Ammo Conecta</a>
            </div>
        </aside>

        <main class="w-full lg:w-1/2 space-y-4">
            <div id="stories-container" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide"></div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <div class="flex gap-3 border-b pb-3">
                    <img id="foto-input" class="w-10 h-10 rounded-full object-cover border">
                    <textarea id="input-mensagem" rows="2" placeholder="O que você está pensando?" class="w-full bg-gray-50 rounded-lg px-4 py-2 text-sm focus:outline-none resize-none"></textarea>
                </div>
                <div class="flex justify-between items-center mt-3">
                    <div class="flex gap-4 items-center">
                        <select id="input-tipo" class="text-xs border rounded p-1 font-bold outline-none"><option value="Atualização">Atualização</option><option value="Meta">Meta Batida</option><option value="Comunicado">📌 Comunicado</option></select>
                        <label for="input-arquivo" class="cursor-pointer text-gray-400 hover:text-blue-500 transition-all flex items-center gap-1"><i class="fa-solid fa-camera text-xl"></i><span id="status-foto" class="text-[9px] font-bold"></span></label>
                        <input type="file" id="input-arquivo" accept="image/*" class="hidden">
                    </div>
                    <button id="btn-publicar" class="bg-blue-600 text-white font-bold py-1.5 px-5 rounded-lg text-xs hover:bg-blue-700">Publicar</button>
                </div>
                <div id="preview-container" class="mt-2 hidden"><img id="img-preview" src="" class="w-20 h-20 object-cover rounded-lg border-2 border-blue-500"></div>
            </div>
            <div id="feed-container" class="space-y-4"></div>
        </main>

        <aside class="w-full lg:w-1/4 space-y-4">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-5 rounded-xl shadow-lg text-white text-center relative overflow-hidden">
                <h3 class="text-[11px] font-black uppercase tracking-[0.2em] mb-3">⭐ Colaborador do Mês</h3>
                <img id="foto-destaque" src="https://ui-avatars.com/api/?name=Ammo&background=fff&color=1d4ed8" 
                     class="w-24 h-24 rounded-full border-4 border-blue-400 mx-auto object-cover shadow-xl cursor-pointer hover:scale-105 transition-transform" 
                     onclick="mudarDestaque()">
                <p id="nome-destaque" class="mt-3 font-black text-lg tracking-tight uppercase"></p>
                <div class="absolute -bottom-2 -right-2 opacity-10 text-6xl"><i class="fa-solid fa-trophy"></i></div>
            </div>

            <div class="bg-white p-5 rounded-xl border text-center shadow-sm">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Atingimento Equipe</h3>
                <div class="bg-gray-200 h-2.5 rounded-full overflow-hidden"><div id="barra-equipa" class="bg-green-500 h-full transition-all duration-1000"></div></div>
                <p id="texto-equipa" class="text-xs font-bold mt-2 text-gray-600"></p>
            </div>
            
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest flex items-center gap-2"><i class="fa-solid fa-medal text-yellow-500"></i> Top Vendas (R$)</h3>
                <ul id="lista-ranking" class="space-y-4 text-sm font-bold text-gray-700"></ul>
            </div>

            <div class="bg-white p-5 rounded-xl border shadow-md min-h-[220px]">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-5 tracking-[0.2em] flex items-center gap-2"><i class="fa-solid fa-cake-candles text-pink-500"></i> Aniversariantes</h3>
                <ul id="lista-aniversariantes" class="space-y-4"></ul>
            </div>
        </aside>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzDI5VfD0EctyU4gLu4Ouvsro_brU18vIBLWUld7c7UkKpL-P8TevzQUUm5OjYYZhxgQ/exec';
        let nomeLogado = localStorage.getItem('ammo_user');
        let storiesVistos = JSON.parse(localStorage.getItem('ammo_stories_vistos')) || [];
        let globalStories = []; let globalUsers = {}; let currentStoryIdx = -1; let storyTimer = null;
        let imagemBase64 = ""; let ultimoIdPost = null;

        if (!nomeLogado) window.location.href = 'login.html';

        async function carregarDados() {
            if (!document.getElementById('story-modal').classList.contains('hidden')) return;
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const d = await res.json();
                globalUsers = d.usuarios;
                const meu = d.usuarios[nomeLogado] || {};

                // Notificação de Som
                if (d.posts && d.posts.length > 0) {
                    const idMaisRecente = d.posts[0].ID;
                    if (ultimoIdPost !== null && idMaisRecente > ultimoIdPost) {
                        document.getElementById('som-notificacao').play().catch(() => {});
                    }
                    ultimoIdPost = idMaisRecente;
                }
                
                // Perfil e Destaque
                document.getElementById('nome-card').innerText = nomeLogado;
                document.getElementById('cargo-card').innerText = localStorage.getItem('ammo_cargo');
                document.getElementById('bio-card').innerText = meu.bio || "Editar bio...";
                document.getElementById('foto-usuario-nav').src = meu.foto || `https://ui-avatars.com/api/?name=${nomeLogado}`;
                document.getElementById('foto-usuario-card').src = meu.foto || `https://ui-avatars.com/api/?name=${nomeLogado}`;
                document.getElementById('foto-input').src = meu.foto || `https://ui-avatars.com/api/?name=${nomeLogado}`;
                document.getElementById('perfil-capa').style.backgroundImage = `url('${meu.capa || ""}')`;

                if(d.destaque) {
                    document.getElementById('nome-destaque').innerText = d.destaque.nome || "A definir";
                    document.getElementById('foto-destaque').src = d.destaque.foto || "https://ui-avatars.com/api/?name=Ammo";
                }

                // Info Cards
                if(d.info) {
                    document.getElementById('info-reunioes').innerText = d.info.reunioes;
                    document.getElementById('info-agenda').innerText = d.info.agenda;
                    document.getElementById('link-treinamento').href = d.info.treinamento;
                    const setorEl = document.getElementById('info-setor');
                    if (d.info.setor?.includes('http')) {
                        setorEl.innerHTML = `<a href="${d.info.setor}" target="_blank" class="bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold text-[10px] block text-center">VER NOTÍCIAS</a>`;
                    } else { setorEl.innerText = d.info.setor || "Sem novidades."; }
                }

                renderizarStories(d.posts, d.usuarios);
                renderizarFeed(d.posts, d.usuarios);
                renderizarRanking(d.ranking);
                renderizarNiver(d.usuarios);
            } catch(e) { console.error(e); }
        }

        // --- RANKING POR VALOR DE VENDAS ---
        function renderizarRanking(rank) {
            const list = document.getElementById('lista-ranking'); list.innerHTML = '';
            rank.sort((a,b) => b.Porcentagem - a.Porcentagem).slice(0,3).forEach((p,i) => {
                const med = ['🥇','🥈','🥉'];
                const valorFormatado = parseFloat(p.Porcentagem).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                list.innerHTML += `<li class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                    <span class="text-xs">${med[i]} ${p.Nome}</span>
                    <span class="text-blue-700 font-black text-xs">${valorFormatado}</span>
                </li>`;
            });
            // Barra de progresso continua em % para o total da equipe
            const total = Math.round(rank.reduce((acc,p) => acc + Number(p.Porcentagem), 0));
            document.getElementById('barra-equipa').style.width = '100%'; // Ajuste visual
            document.getElementById('texto-equipa').innerText = "Meta Global Ativa";
        }

        // --- UPLOADS (FOTOS DA GALERIA) ---
        window.mudarFotoPerfil = () => document.getElementById('input-upload-perfil').click();
        window.mudarCapa = () => document.getElementById('input-upload-capa').click();
        window.mudarDestaque = () => {
            const nome = prompt("Nome do Colaborador do Mês:");
            if(nome) {
                localStorage.setItem('temp_destaque_nome', nome);
                document.getElementById('input-upload-destaque').click();
            }
        };

        document.getElementById('input-upload-perfil').addEventListener('change', (e) => subirFoto(e.target.files[0], 'atualizarPerfil', 'Foto_Perfil'));
        document.getElementById('input-upload-capa').addEventListener('change', (e) => subirFoto(e.target.files[0], 'atualizarCapa', 'Capa'));
        document.getElementById('input-upload-destaque').addEventListener('change', (e) => {
            const nome = localStorage.getItem('temp_destaque_nome');
            subirFoto(e.target.files[0], 'atualizarDestaque', 'Foto', nome);
        });

        async function subirFoto(arquivo, acao, campo, nomeExtra = null) {
            if (!arquivo) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image(); img.src = e.target.result;
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 500; canvas.height = 500;
                    canvas.getContext("2d").drawImage(img, 0, 0, 500, 500);
                    const base64 = canvas.toDataURL("image/jpeg", 0.6);
                    const p = { action: acao, Nome: nomeExtra || nomeLogado }; p[campo] = base64;
                    await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(p) });
                    carregarDados();
                };
            };
            reader.readAsDataURL(arquivo);
        }

        // --- FEED E STORIES ---
        function renderizarFeed(posts, users) {
            const container = document.getElementById('feed-container'); container.innerHTML = '';
            posts.forEach(p => {
                const cor = p.Tipo === 'Comunicado' ? 'border-l-4 border-l-red-600 bg-red-50' : (p.Tipo === 'Meta' ? 'border-l-4 border-l-yellow-400 bg-yellow-50' : 'border-l-4 border-l-blue-400');
                const fA = users[p.Autor]?.foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.Autor)}`;
                let img = p.Imagem ? `<div class="mt-3 bg-gray-50 rounded-xl overflow-hidden flex justify-center"><img src="${p.Imagem}" class="max-w-full max-h-[500px] object-contain"></div>` : '';
                let coms = '';
                if(p.Comentarios) p.Comentarios.forEach(c => {
                    const fc = users[c.autor]?.foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.autor)}`;
                    coms += `<div class="flex gap-2 mt-3 animate-fade-in"><img src="${fc}" class="w-6 h-6 rounded-full border"><div class="bg-gray-100 p-2 rounded-2xl text-[11px] w-full"><p class="font-bold text-gray-800">${c.autor}</p><p class="text-gray-600">${c.texto}</p></div></div>`;
                });
                container.innerHTML += `<div class="bg-white p-5 rounded-xl border ${cor} shadow-sm mb-4"><div class="flex gap-3 mb-3"><img src="${fA}" class="w-10 h-10 rounded-full object-cover border"><div><p class="font-bold text-sm text-gray-800">${p.Autor}</p><p class="text-[10px] text-gray-400">${p.Data} • <b>${p.Tipo.toUpperCase()}</b></p></div></div><p class="text-sm text-gray-700">${p.Mensagem}</p>${img}<div class="flex gap-6 mt-4 pt-3 border-t border-gray-100 text-[10px] font-black text-gray-500"><button onclick="window.darGosto('${p.ID}', this)" class="flex items-center gap-2 hover:text-blue-600 transition-all uppercase"><i class="fa-solid fa-thumbs-up"></i> CURTIR (<span class="count">${p.Curtidas || 0}</span>)</button><div class="flex items-center gap-2 uppercase"><i class="fa-solid fa-comments"></i> Comentários (${p.Comentarios ? p.Comentarios.length : 0})</div></div><div class="mt-4 pt-4 border-t border-gray-100"><div class="max-h-40 overflow-y-auto aside-scroll mb-3">${coms}</div><div class="flex gap-2 items-center"><img src="${document.getElementById('foto-usuario-nav').src}" class="w-7 h-7 rounded-full object-cover border"><input type="text" onkeydown="if(event.key==='Enter')window.enviarCom('${p.ID}', this)" placeholder="Enter para comentar..." class="w-full bg-gray-50 border rounded-full px-4 py-2 text-xs outline-none"></div></div></div>`;
            });
        }

        // --- RESTANTE DO SCRIPT ---
        function renderizarStories(posts, users) {
            const container = document.getElementById('stories-container'); container.innerHTML = '';
            const recentes = posts.filter(p => p.Imagem && p.Imagem.trim() !== '' && (new Date().getTime() - p.ID) <= 86400000);
            globalStories = recentes;
            const minhaFoto = users[nomeLogado]?.foto || `https://ui-avatars.com/api/?name=${nomeLogado}`;
            container.innerHTML += `<div class="relative w-20 h-32 rounded-xl flex-shrink-0 bg-white border shadow-sm"><img src="${minhaFoto}" class="w-full h-20 object-cover opacity-80"><div class="absolute top-16 left-1/2 -translate-x-1/2 bg-blue-600 text-white rounded-full w-6 h-6 flex items-center justify-center border-2 border-white text-[8px] font-bold">+</div></div>`;
            globalStories.forEach(p => {
                const fA = users[p.Autor]?.foto || `https://ui-avatars.com/api/?name=${p.Autor}`;
                container.innerHTML += `<div onclick="abrirStory('${p.ID}', '${p.Imagem}', '${p.Autor}', '${fA}')" class="relative w-20 h-32 rounded-xl flex-shrink-0 cursor-pointer border shadow-sm overflow-hidden"><img src="${p.Imagem}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute top-1 left-1 w-7 h-7 rounded-full border-2 border-blue-500"><img src="${fA}" class="w-full h-full rounded-full object-cover"></div></div>`;
            });
        }

        function abrirStory(id, img, autor, avatar) {
            document.getElementById('modal-story-img').src = img; document.getElementById('modal-story-autor').innerText = autor; document.getElementById('modal-story-avatar').src = avatar;
            document.getElementById('story-modal').classList.replace('hidden', 'flex'); document.body.style.overflow = 'hidden';
            currentStoryIdx = globalStories.findIndex(s => String(s.ID) === String(id)); iniciarBarra();
        }

        function iniciarBarra() {
            clearInterval(storyTimer); const barra = document.getElementById('story-progress-bar');
            barra.style.transition = 'none'; barra.style.width = '0%';
            setTimeout(() => { barra.style.transition = 'width 5s linear'; barra.style.width = '100%'; }, 50);
            storyTimer = setTimeout(() => { if(currentStoryIdx < globalStories.length - 1){ const p = globalStories[currentStoryIdx+1]; abrirStory(p.ID, p.Imagem, p.Autor, globalUsers[p.Autor]?.foto || ""); } else fecharStory(); }, 5000);
        }

        function fecharStory() { clearInterval(storyTimer); document.getElementById('story-modal').classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; carregarDados(); }

        function renderizarNiver(dic) {
            const list = document.getElementById('lista-aniversariantes'); list.innerHTML = '';
            const mesA = new Date().getMonth() + 1;
            for(const n in dic) {
                const dStr = String(dic[n].nascimento).trim(); let diaN, mesN;
                if(dStr.includes('/')){ const p = dStr.split('/'); diaN = p[0]; mesN = parseInt(p[1]); }
                if(mesN === mesA) {
                    const f = dic[n].foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}`;
                    list.innerHTML += `<li class="flex items-center gap-3"><img src="${f}" class="w-10 h-10 rounded-full object-cover border-2 border-pink-200 shadow-sm"><div class="flex flex-col"><span class="text-xs font-black text-gray-800">${n.split(' ')[0]}</span><span class="text-[9px] bg-pink-500 text-white px-2 py-0.5 rounded-full w-fit">Dia ${diaN}</span></div></li>`;
                }
            }
        }

        window.darGosto = async (id, btn) => {
            const countSpan = btn.querySelector('.count');
            if(!countSpan || btn.disabled) return;
            countSpan.innerText = parseInt(countSpan.innerText) + 1;
            btn.disabled = true; btn.classList.add('text-blue-600');
            await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify({ action: 'gostar', id: String(id) }) });
        };

        window.enviarCom = async (id, el) => {
            const texto = el.value.trim(); if(!texto || el.disabled) return;
            el.disabled = true;
            await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify({ action: 'comentar', id: String(id), Autor: nomeLogado, Texto: texto }) });
            el.value = ''; el.disabled = false; carregarDados();
        };

        document.getElementById('input-arquivo').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image(); img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const escala = 800 / img.width; canvas.width = 800; canvas.height = img.height * escala;
                    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                    imagemBase64 = canvas.toDataURL("image/jpeg", 0.7);
                    document.getElementById('preview-container').classList.remove('hidden');
                    document.getElementById('img-preview').src = imagemBase64;
                    document.getElementById('status-foto').innerText = "OK!";
                }
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('btn-publicar').addEventListener('click', async () => {
            const msg = document.getElementById('input-mensagem').value; if (!msg && !imagemBase64) return;
            const btn = document.getElementById('btn-publicar'); btn.disabled = true; btn.innerText = "...";
            await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify({ action: 'novoPost', Autor: nomeLogado, Mensagem: msg, Tipo: document.getElementById('input-tipo').value, Imagem: imagemBase64 }) });
            document.getElementById('input-mensagem').value = ''; imagemBase64 = ""; document.getElementById('preview-container').classList.add('hidden');
            btn.disabled = false; btn.innerText = "Publicar"; carregarDados();
        });

        async function mudarBio() { const bio = prompt("Sua Bio:"); if(bio) await fetch(APPS_SCRIPT_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'atualizarBio', Nome:nomeLogado, Bio:bio})}); carregarDados(); }
        function sair() { localStorage.clear(); window.location.href = 'login.html'; }
        carregarDados(); setInterval(carregarDados, 30000);
    </script>
</body>
</html>
